<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GALON SIMULATOR</title>
<style>
  body { margin:0; overflow:hidden; background:#87CEEB; font-family:sans-serif; touch-action:none; }
  #game {
    width:100vw; height:100vh;
    background: linear-gradient(#87CEEB 60%, #8B5A2B 60%); /* langit + tanah */
    position:relative;
  }
  /* 1. Bangunan Depot */
  .depot {
    position:absolute; bottom:20%; left:50%; transform:translateX(-50%);
    width:70vw; height:35vh;
    background:#4CAF50; border:1vw solid #2E7D32;
    box-shadow:inset 0 -3vh #3A753D;
  }
  .depot::before { /* Tumpukan Galon */
    content:''; position:absolute; top:-10vh; left:5vw;
    width:20vw; height:10vh;
    background:repeating-linear-gradient(0deg, #2196F3 0 2vh, #1976D2 2vh 4vh);
    border-radius:1vw;
  }
  .depot::after { /* Pintu Depot */
    content:'DEPOT'; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
    width:20vw; height:15vh; background:#795548; color:#fff;
    display:flex; align-items:center; justify-content:center; font:700 4vw sans-serif;
  }
  
  /* 2. Pak Bos */
  .bos {
    position:absolute; bottom:20%; left:55%;
    width:10vw; height:15vh;
    background:#FFDBAC; border-radius:5vw 5vw 0 0; /* kepala + badan */
  }
  .bos::before { /* Tangan nunjuk */
    content:'🫵'; position:absolute; top:2vh; left:-3vw; font-size:6vw;
  }

  /* 3. Logo Miring */
  .logo {
    position:absolute; top:5%; left:50%;
    transform: translateX(-50%) rotate(-25deg);
    font:900 9vw 'Arial Black', sans-serif;
    color:#FFD700; text-shadow:4px 4px 0 #000;
    animation: goyang 2s infinite ease-in-out;
  }

  /* 4. Motor Player */
  .motor {
    position:absolute; bottom:5%; left:10vw;
    width:35vw; height:20vw;
    background:url('motor_galon.png') center/contain no-repeat; /* ganti gambar kamu */
    transition: left 0.3s linear;
  }
  
  /* 5. UI Game */
  .btn {
    position:absolute; bottom:5%; right:5%;
    padding:4vw 6vw; font:700 5vw sans-serif;
    background:#FF3B30; color:#fff; border:none; border-radius:3vw;
  }
  .uang {
    position:absolute; top:5%; right:5%;
    font:700 6vw sans-serif; color:#fff; text-shadow:2px 2px 0 #000;
  }

  @keyframes goyang {
    0%,100%{ transform: translateX(-50%) rotate(-25deg) scale(1); }
    50%{ transform: translateX(-50%) rotate(-23deg) scale(1.05); }
  }
</style>
</head>
<body>
  <div id="game">
    <div class="logo">GALON SIMULATOR</div>
    <div class="depot"></div>
    <div class="bos"></div>
    <div class="motor" id="motor"></div>
    <button class="btn" id="antar">ANTAR GALON</button>
    <div class="uang" id="uang">Rp 0</div>
  </div>

<script>
  const motor = document.getElementById('motor');
  const antarBtn = document.getElementById('antar');
  const uangTxt = document.getElementById('uang');
  let pos = 10; 
  let uang = 0;

  antarBtn.addEventListener('click', () => {
    if(pos < 50) { // kalau masih di depot
      pos = 80; // motor jalan ke kanan nganter
      motor.style.left = pos + 'vw';
      setTimeout(() => {
        uang += 5000; // dapet duit
        uangTxt.textContent = 'Rp ' + uang.toLocaleString('id-ID');
        pos = 10; // balik ke depot
        motor.style.left = pos + 'vw';
      }, 800); // delay 0.8s kayak lagi nganter
    }
  });
</script>
</body>
  </html>
