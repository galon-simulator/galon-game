<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GALON SIMULATOR</title>
<style>
  body { margin:0; overflow:hidden; background:#87CEEB; }
  #game {
    width:100vw; height:100vh; 
    background:url('depot_galon.jpg') center/cover no-repeat; /* ganti sama gambar depot kamu */
    position:relative;
  }
  .logo {
    position:absolute; top:5%; left:50%;
    transform: translateX(-50%) rotate(-25deg); /* ini bikin miring */
    font:900 10vw 'Arial Black', sans-serif; 
    color:#FFD700; text-shadow:4px 4px 0 #000;
    white-space:nowrap;
    animation: goyang 2s infinite ease-in-out; /* biar gerak dikit */
  }
  .motor {
    position:absolute; bottom:15%; left:-30%;
    width:40vw;
    background:url('motor_galon.png') center/contain no-repeat; /* ganti sama gambar motor kamu */
    height:25vw;
    animation: jalan 6s linear infinite; /* motor jalan terus */
  }
  @keyframes goyang {
    0%,100%{ transform: translateX(-50%) rotate(-25deg) scale(1); }
    50%{ transform: translateX(-50%) rotate(-23deg) scale(1.05); }
  }
  @keyframes jalan {
    0%{ left:-30%; }
    100%{ left:110%; }
  }
</style>
</head>
<body>
  <div id="game">
    <div class="logo">GALON SIMULATOR</div>
    <div class="motor"></div>
  </div>
</body>
</html>
