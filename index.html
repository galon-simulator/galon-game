<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GALON SIMULATOR</title>
<style>
  body { margin:0; overflow:hidden; background:#87CEEB; font-family:sans-serif; touch-action:none; }
  #game {
    width:100vw; height:100vh;
    background: linear-gradient(#87CEEB 60%, #A0522D 60%);
    position:relative;
  }

 .depot {
    position:absolute; bottom:20%; left:50%; transform:translateX(-50%);
    width:75vw; height:38vh;
    background: linear-gradient(#d1b89a 0 0), repeating-linear-gradient(0deg, #c49a6c 0 4px, #b08550 4px 8px);
    background-blend-mode: overlay;
    border: 1.5vw solid #5a3e2b;
    border-radius: 0 0 2vw 2vw;
    box-shadow: 0 2vh 0 #3e2a1d;
  }
 .depot::before { /* Atap Seng */
    content:''; position:absolute; top:-8vh; left:-2vw;
    width:79vw; height:8vh;
    background: repeating-linear-gradient(90deg, #b0b0b0 0 10px, #909090 10px 20px);
    clip-path: polygon(0 100%, 100% 100%, 95% 0, 5% 0);
  }
 .depot::after { /* Tumpukan Galon */
    content:''; position:absolute; top:-12vh; left:4vw; width:22vw; height:12vh;
    background: radial-gradient(circle at 30% 30%, #5aa9e6, #1e6ea7);
    box-shadow: 1vw 1vw 0 #1e6ea7, 2vw 2vw 0 #1e6ea7;
    border-radius:1vw;
  }
 .pintu {
    position:absolute; bottom:0; left:50%; transform:translateX(-50%);
    width:25vw; height:18vh;
    background: repeating-linear-gradient(0deg, #777 0 1vh, #555 1vh 2vh);
    border: 1vw solid #444;
    display:flex; align-items:flex-end; justify-content:center;
    color:#FFD700; font:900 4vw 'Arial Black', sans-serif;
    text-shadow:2px 2px 0 #000; padding-bottom:1vh;
  }

 .bos {
    position:absolute; bottom:20%; left:58%;
    width:11vw; height:16vh;
    background:#FFDBAC; border-radius:5vw 5vw 0 0;
    border: 0.5vw solid #e0c49f;
  }
 .bos::before {
    content:'🫵'; position:absolute; top:2vh; left:-4vw; font-size:7vw;
  }

  /* 1. PLAYER DENGAN KEPALA NOLEH */
 .player {
    position:absolute; bottom:5%; left:12vw;
    width:9vw; height:14vh;
    background:#FFDBAC; border-radius:4vw 4vw 0 0;
    border: 0.5vw solid #e0c49f;
    transition: left 0.8s ease-in-out;
    z-index: 2;
  }
 .player.kepala { /* Kepala terpisah biar bisa noleh */
    position:absolute; top:-4vh; left:50%; transform:translateX(-50%);
    width:7vw; height:7vw; background:#FFDBAC; border-radius:50%;
    transition: transform 0.3s; /* Animasi noleh */
  }
 .player.jalan.kepala { transform: translateX(20%) scaleX(-1); } /* Noleh ke kanan pas jalan */
 .player::before { /* Topi */
    content:''; position:absolute; top:-6vh; left:50%; transform:translateX(-50%);
    width:8vw; height:2vh; background:var(--warna-baju, #FF3B30); border-radius:2vw 2vw 0 0;
    z-index:3;
  }
 .player::after { /* Baju */
    content:''; position:absolute; top:2vh; left:0;
    width:100%; height:8vh; background:var(--warna-baju, #2196F3); border-radius:0 0 2vw 2vw;
  }

 .motor {
    position:absolute; bottom:5%; left:10vw;
    width:35vw; height:20vw;
    background:url('motor_galon.png') center/contain no-repeat;
    transition: left 0.8s ease-in-out;
    filter: drop-shadow(0 1vh 0 #0005);
    z-index: 1;
  }

 .logo {
    position:absolute; top:5%; left:50%;
    transform: translateX(-50%) rotate(-25deg);
    font:900 9vw 'Arial Black', sans-serif;
    color:#FFD700; text-shadow:4px 4px 0 #000;
    animation: goyang 2s infinite ease-in-out;
  }
 .btn {
    position:absolute; bottom:5%; right:5%;
    padding:4vw 6vw; font:700 5vw sans-serif;
    background:#FF3B30; color:#fff; border:none; border-radius:3vw;
  }
 .btn2 { /* Tombol ganti skin */
    position:absolute; bottom:5%; left:5%;
    padding:3vw 5vw; font:700 4vw sans-serif;
    background:#2196F3; color:#fff; border:none; border-radius:3vw;
  }
 .uang {
    position:absolute; top:5%; right:5%;
    font:700 6vw sans-serif; color:#fff; text-shadow:2px 2px 0 #000;
  }

  @keyframes goyang { 0%,100%{ transform: translateX(-50%) rotate(-25deg) scale(1); } 50%{ transform: translateX(-50%) rotate(-23deg) scale(1.05); } }
</style>
</head>
<body>
  <div id="game">
    <div class="logo">GALON SIMULATOR</div>
    <div class="depot"><div class="pintu">DEPOT</div></div>
    <div class="bos"></div>
    <div class="motor" id="motor"></div>
    <div class="player" id="player"><div class="kepala"></div></div>
    <button class="btn" id="antar">ANTAR GALON</button>
    <button class="btn2" id="ganti">GANTI BAJU 50rb</button>
    <div class="uang" id="uang">Rp 0</div>
  </div>

<script>
  const motor = document.getElementById('motor');
  const player = document.getElementById('player');
  const antarBtn = document.getElementById('antar');
  const gantiBtn = document.getElementById('ganti');
  const uangTxt = document.getElementById('uang');
  let pos = 10;
  let uang = 0;
  let sibuk = false;
  const skins = ['#2196F3', '#4CAF50', '#FFC107', '#9C27B0']; // Biru, Ijo, Kuning, Ungu
  let skinIndex = 0;

  function gerakKendaraan(targetPos, lagiJalan) {
    motor.style.left = targetPos + 'vw';
    player.style.left = (targetPos + 2) + 'vw';
    if(lagiJalan) player.classList.add('jalan'); // Tambah class biar kepala noleh
    else player.classList.remove('jalan');
  }

  antarBtn.addEventListener('click', () => {
    if(sibuk) return;
    sibuk = true;
    gerakKendaraan(80, true);
    setTimeout(() => {
      uang += 10000;
      uangTxt.textContent = 'Rp ' + uang.toLocaleString('id-ID');
      gerakKendaraan(10, false); // Kepala balik normal
      sibuk = false;
    }, 1800);
  });

  gantiBtn.addEventListener('click', () => {
    if(uang >= 50000) {
      uang -= 50000;
      skinIndex = (skinIndex + 1) % skins.length;
      document.documentElement.style.setProperty('--warna-baju', skins[skinIndex]); // Ganti warna baju + topi
      uangTxt.textContent = 'Rp ' + uang.toLocaleString('id-ID');
    } else {
      alert('Uang kurang! Kerja dulu 😤');
    }
  });
</script>
</body>
  </html>
